<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expiry Alert - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container glass">
        <h1 class="brand-title">Smart Expiry Tracker</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('register')">Register</button>
        </div>

        <div id="login-form" class="form-container active">
            <h2>Welcome Back</h2>
            <form onsubmit="handleLogin(event)">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn primary">Secure Login</button>
            </form>
        </div>

        <div id="register-form" class="form-container">
            <h2>Create Account</h2>
            <form onsubmit="handleRegister(event)">
                <input type="text" id="reg-name" placeholder="Full Name" required>
                <input type="email" id="reg-email" placeholder="Email Address" required>
                <input type="password" id="reg-password" placeholder="Create Password" required>
                <button type="submit" class="btn primary">Sign Up</button>
            </form>
        </div>
        <p id="auth-error" class="error-msg"></p>
        <p id="auth-success" class="success-msg"></p>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
