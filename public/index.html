<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Expiry Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="dashboard-page">
    <nav class="navbar glass">
        <h2>Smart Expiry Tracker</h2>
        <div class="nav-links">
            <span id="user-greeting"></span>
            <button class="btn logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <main class="container">
        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card glass">
                <h3>Total Items</h3>
                <p id="total-items">0</p>
            </div>
            <div class="stat-card glass yellow">
                <h3>Expiring Soon (< 7 Days)</h3>
                <p id="expiring-soon">0</p>
            </div>
            <div class="stat-card glass red">
                <h3>Expired</h3>
                <p id="expired-items">0</p>
            </div>
        </div>

        <div class="layout">
            <!-- Add Item Form -->
            <aside class="add-item-sidebar glass">
                <h2>Add Household Item</h2>
                <form id="add-item-form" onsubmit="handleAddItem(event)">
                    <div class="form-group">
                        <label>Item Name</label>
                        <input type="text" id="item-name" required placeholder="e.g. Milk, Paracetamol">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="item-category" required>
                            <option value="Food">Food</option>
                            <option value="Grocery">Grocery</option>
                            <option value="Medicine">Medicine</option>
                            <option value="Cosmetic">Cosmetic</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Purchase Date</label>
                        <input type="date" id="purchase-date">
                    </div>
                    <div class="form-group">
                        <label>Expiry Date</label>
                        <input type="date" id="expiry-date" required>
                    </div>
                    <div class="form-group">
                        <label>Notes (Optional)</label>
                        <textarea id="item-notes" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn primary full-width">Save Item</button>
                </form>
            </aside>

            <!-- Items List -->
            <section class="items-section">
                <div class="filters glass">
                    <input type="text" id="search-bar" placeholder="Search by name..." oninput="renderItems()">
                    <select id="filter-category" onchange="renderItems()">
                        <option value="All">All Categories</option>
                        <option value="Food">Food</option>
                        <option value="Grocery">Grocery</option>
                        <option value="Medicine">Medicine</option>
                        <option value="Cosmetic">Cosmetic</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div id="items-grid" class="items-grid">
                    <!-- Items will be injected here via JavaScript -->
                </div>
            </section>
        </div>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
